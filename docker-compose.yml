services:
  # ==========================================================================
  # DATABASE
  # ==========================================================================
  radar_db:
    image: postgis/postgis:15-3.5
    container_name: radar_db-gl
    environment: 
      POSTGRES_DB: radar_prod_db
      POSTGRES_USER: radar
      POSTGRES_PASSWORD: radarpass
    volumes:
      - ../radar_db_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radar -d radar_prod_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ==========================================================================
  # DATABASE INITIALIZATION (runs once)
  # ==========================================================================
  db-init:
    build:
      context: ./database
      dockerfile: Dockerfile
    container_name: radar_db_init-gl
    environment:
      DB_HOST: radar_db
      DB_PORT: 5432
      DB_NAME: radar_prod_db
      DB_USER: radar
      DB_PASSWORD: radarpass
    depends_on:
      radar_db:
        condition: service_healthy
    command: >
      sh -c "
        echo 'Waiting for database...' &&
        python -m radar_db.manage init &&
        python -m radar_db.manage migrate upgrade -r head &&
        python -m radar_db.manage seed &&
        echo 'Database initialized!'
      "
    restart: "no"

  # ==========================================================================
  # COG INDEXER SERVICE
  # ==========================================================================
  indexer:
    build:
      context: ./
      dockerfile: ./indexer/Dockerfile
    container_name: radar_indexer
    environment:
      DB_HOST: radar_db
      DB_PORT: 5432
      DB_NAME: radar_prod_db
      DB_USER: radar
      DB_PASSWORD: radarpass
      WATCH_PATH: /product_output
      SCAN_INTERVAL: 30
      FILE_PATTERN: "*.tif"
      COMPUTE_STATS: "true"
      COMPUTE_CHECKSUM: "false"
      RADAR_CODES: "RMA1"  # Optional: limit to specific radars
    volumes:
      - ../product_output:/product_output:ro
    depends_on:
      radar_db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ==========================================================================
  # BACKEND API
  # ==========================================================================
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: radar_api
    environment:
      DB_HOST: radar_db
      DB_PORT: 5432
      DB_NAME: radar_prod_db
      DB_USER: radar
      DB_PASSWORD: radarpass
      COG_BASE_PATH: /product_output
      CORS_ORIGINS: "*"
    volumes:
      - ../product_output:/product_output:ro
    ports:
      - "8000:8000"
    depends_on:
      radar_db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==========================================================================
  # FRONTEND
  # ==========================================================================
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: radar_frontend
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped