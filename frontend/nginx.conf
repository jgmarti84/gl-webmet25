# frontend/nginx.conf
events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Cache for proxied OSM tiles (1 GB max, 30-day TTL)
    proxy_cache_path /var/cache/nginx/osm_tiles
        levels=1:2
        keys_zone=osm_tiles:10m
        max_size=1g
        inactive=30d
        use_temp_path=off;

    server {
        listen 80;
        server_name localhost;

        # Serve static files
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # Proxy API requests to backend
        # proxy_pass uses the Docker service name "api" so Docker DNS resolves
        # correctly when multiple Uvicorn workers are running behind the same port.
        location /api/ {
            proxy_pass http://api:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # CORS headers (if needed)
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept";
        }

        # Proxy OSM tiles server-side so Nginx adds the required Referer header.
        # Tiles are cached locally to reduce upstream load and improve performance.
        location /osm-tiles/ {
            proxy_pass https://tile.openstreetmap.org/;
            proxy_http_version 1.1;
            proxy_ssl_server_name on;

            # Headers required by the OSM tile usage policy
            proxy_set_header Host "tile.openstreetmap.org";
            proxy_set_header Referer "https://www.openstreetmap.org/";
            proxy_set_header User-Agent "WebMet25 radar visualization (nginx tile proxy)";

            # Do not forward browser headers that could reveal the client origin
            proxy_set_header X-Real-IP "";
            proxy_set_header X-Forwarded-For "";

            # Cache tiles for 30 days; serve stale on upstream errors
            proxy_cache osm_tiles;
            proxy_cache_key "$uri";
            proxy_cache_valid 200 30d;
            proxy_cache_use_stale error timeout updating http_500 http_503;
            add_header X-Cache-Status $upstream_cache_status;
        }

        # Health check
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }
    }
}