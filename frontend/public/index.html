<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar Visualization - WebMet25</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Our CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Map Container -->
    <div id="map"></div>
    
    <!-- Control Panel (Top Right) -->
    <div id="control-panel">
        <h3>🌧️ Radar Viewer</h3>
        
        <!-- Basemap Selection -->
        <div class="control-group">
            <label for="basemap-select">Basemap:</label>
            <select id="basemap-select">
                <option value="dark">Dark</option>
                <option value="light">Light</option>
                <option value="osm">OpenStreetMap</option>
                <option value="satellite">Satellite</option>
                <option value="terrain">Terrain</option>
            </select>
        </div>
        
        <!-- Radar Selection (Checkboxes) -->
        <div class="control-group">
            <label>Radars:</label>
            <button id="btn-toggle-radars" class="toggle-btn">Show Radars ▼</button>
            <div id="radar-checkboxes" class="checkbox-container" style="display: none;">
                <div class="checkbox-actions">
                    <button id="btn-select-all-radars" class="small-btn">All</button>
                    <button id="btn-clear-all-radars" class="small-btn">None</button>
                </div>
                <div id="radar-list">
                    <!-- Checkboxes will be populated dynamically -->
                </div>
            </div>
        </div>
        
        <!-- Product Selection -->
        <div class="control-group">
            <label for="product-select">Product:</label>
            <div class="product-controls">
                <select id="product-select">
                    <option value="">Select product...</option>
                </select>
                <button id="btn-toggle-filter" class="filter-toggle-btn" title="Toggle filtered/unfiltered products">
                    <span id="filter-status">Filtered</span>
                </button>
            </div>
        </div>
        
        <!-- Latest Button -->
        <div class="control-group">
            <button id="btn-load-latest" class="action-btn" disabled>Load Latest</button>
        </div>
        
        <!-- Time Display -->
        <div class="control-group">
            <label>Time:</label>
            <div id="time-display">--:--</div>
        </div>
        
        <!-- Navigation Buttons -->
        <div class="control-group nav-buttons">
            <button id="btn-prev" title="Previous">◀</button>
            <button id="btn-latest" title="Latest">⟲</button>
            <button id="btn-next" title="Next">▶</button>
        </div>
        
        <!-- Opacity Control -->
        <div class="control-group">
            <label for="opacity-slider">Opacity:</label>
            <div class="opacity-control">
                <input type="range" id="opacity-slider" min="0" max="1" step="0.1" value="0.7">
                <span id="opacity-value">70%</span>
            </div>
        </div>
        
        <!-- Status -->
        <div id="status" class="status">Ready</div>
    </div>
    
    <!-- Legend Container (Bottom Left) -->
    <div id="legend-container"></div>
    
    <!-- Animation Controls (Bottom Center) -->
    <div id="animation-controls">
        <!-- Animation Slider -->
        <div class="animation-slider-container">
            <input type="range" id="animation-slider" min="0" max="0" value="0" step="1">
        </div>
        
        <!-- Control Buttons -->
        <div class="animation-buttons">
            <button id="btn-play-pause" title="Play">▶</button>
            <button id="btn-speed" title="Speed: 1x">1x</button>
            <span id="frame-counter">-- / --</span>
        </div>
    </div>
    
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Our JS Modules (with built-in Leaflet loading check) -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
